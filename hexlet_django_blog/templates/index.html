{% extends "base.html" %}

{% block content %}
    <h1>Список статей (Всего: {{ articles|length }})</h1>
    {% for article in articles %}
        <h2>{{ article.title }}</h2>
        <a href="{% url 'articles_update' article.id %}">Редактировать</a>
        <div>{{ article.content|slice:":200" }}</div>
    {% empty %}
        <p>Статей пока нет.</p>
    {% endfor %}
{% endblock %}
